<section class="container-fluid page-shell">
  <header class="page-header">
    <div>
      <p class="eyebrow">实例</p>
      <h2 class="fw-bold mb-1">代理实例</h2>
      <p class="text-muted mb-0">管理代理模式、上游连接和缓存策略。</p>
    </div>
    <div class="card-actions">
      <div ngbDropdown>
        <button type="button" class="btn btn-primary" ngbDropdownToggle>新增实例</button>
        <div ngbDropdownMenu>
          <button ngbDropdownItem (click)="startCreate(ProxyMode.File)">文件代理</button>
          <button ngbDropdownItem (click)="startCreate(ProxyMode.Oci)">容器镜像代理</button>
          <button ngbDropdownItem (click)="startCreate(ProxyMode.Npm)">npm 包代理</button>
          <button ngbDropdownItem (click)="startCreate(ProxyMode.Go)">Go 模块代理</button>
          <button ngbDropdownItem (click)="startCreate(ProxyMode.Maven)">Maven/Gradle 代理</button>
          <button ngbDropdownItem (click)="startCreate(ProxyMode.Cargo)">Cargo 包代理</button>
          <button ngbDropdownItem (click)="startCreate(ProxyMode.PyPI)">PyPI 包代理</button>
        </div>
      </div>
      <button type="button" class="btn btn-outline-secondary" (click)="openImportExport()">导入导出</button>
    </div>
  </header>

  @if (loading) {
    <div class="card placeholder-glow">
      <div class="card-body">
        <span class="placeholder page-placeholder page-placeholder-lg w-100"></span>
      </div>
    </div>
  }

  @if (!loading) {
    @if (instances.length === 0) {
      <div class="card">
        <div class="card-body text-center text-muted py-5">还没有实例，点击上方按钮创建。</div>
      </div>
    } @else {
      <div class="card">
        <div class="card-header bg-body-tertiary border-0 py-3">
          <div class="card-title-row">
            <div>
              <h5 class="card-title mb-1">实例清单</h5>
              <p class="text-muted mb-0">查看实例模式，并进入编辑、复制或缓存查询。</p>
            </div>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>名称</th>
                <th>模式</th>
                <th class="text-end">操作</th>
              </tr>
            </thead>
            <tbody>
              @for (item of instances; track item.name) {
                <tr>
                  <td><strong>{{ item.name }}</strong></td>
                  <td><span class="badge bg-primary-subtle text-primary-emphasis">{{ item.mode | modeLabel }}</span></td>
                  <td class="text-end text-nowrap">
                    <button type="button" class="btn btn-sm btn-outline-secondary" (click)="startEdit(item.name)">编辑</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary ms-1" (click)="copyInstance(item.name)">复制</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary ms-1" (click)="openLookupModal(item.name)">查询缓存</button>
                    <button type="button" class="btn btn-sm btn-outline-danger ms-1" (click)="promptDelete(item.name)">删除</button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    }
  }
</section>
