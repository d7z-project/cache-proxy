<section class="container-fluid" style="max-width: 1200px;">
  <header class="d-flex justify-content-between align-items-start gap-3 mb-4 flex-wrap">
    <div>
      <p class="eyebrow">设置</p>
      <h2 class="fw-bold mb-0">全局配置</h2>
    </div>
    <div class="d-flex gap-2">
      <button type="button" class="btn btn-outline-secondary" (click)="load()">重新载入</button>
      <button type="button" class="btn btn-outline-danger" (click)="promptReset()">恢复默认</button>
      <button type="button" class="btn btn-primary" (click)="save()" [disabled]="saving || !draft">{{ saving ? '保存中...' : '保存' }}</button>
    </div>
  </header>

  @if (loading) {
    <div class="row g-3">
      <div class="col-md-6"><div class="card placeholder-glow" style="min-height:220px"><span class="placeholder col-12 h-100"></span></div></div>
      <div class="col-md-6"><div class="card placeholder-glow" style="min-height:220px"><span class="placeholder col-12 h-100"></span></div></div>
    </div>
  }

  @if (!loading && draft && runtime) {
    <div class="row g-3">
      <div class="col-md-6">
        <form class="card h-100">
          <div class="card-body d-flex flex-column gap-3">
            <div>
              <h5 class="card-title mb-1">持久化配置</h5>
              <p class="text-muted small mb-0">配置仓库中的全局项。</p>
            </div>
            <div>
              <label class="form-label">Metrics 路径</label>
              <input class="form-control" name="metricsPath" [(ngModel)]="draft.metrics.path" placeholder="/-/metrics">
            </div>
            <div>
              <label class="form-label">Blob GC 周期</label>
              <input class="form-control" name="blobGc" [(ngModel)]="draft.storage.gc.blob" placeholder="24h">
            </div>
            <div>
              <label class="form-label">配置版本</label>
              <input class="form-control" [ngModel]="draft.version" name="version" disabled>
            </div>
          </div>
        </form>
      </div>

      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-body">
            <h5 class="card-title mb-1">运行时状态</h5>
            <p class="text-muted small mb-3">当前进程和配置代次。</p>
            <dl class="kv-list">
              <div><dt>主监听</dt><dd>{{ runtime.bind }}</dd></div>
              <div><dt>存储目录</dt><dd>{{ runtime.backend }}</dd></div>
              <div><dt>当前 Metrics</dt><dd>{{ runtime.metricsPath }}</dd></div>
              <div><dt>当前 GC 周期</dt><dd>{{ runtime.gcInterval }}</dd></div>
              <div><dt>配置代次</dt><dd>{{ global?.generation }}</dd></div>
              <div><dt>实例数量</dt><dd>{{ runtime.instances }}</dd></div>
            </dl>
          </div>
        </div>
      </div>
    </div>
  }
</section>
