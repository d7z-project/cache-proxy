<app-toast-container></app-toast-container>
<app-modal></app-modal>

<nav class="top-nav">
  <a class="brand" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Cache Proxy</a>

  <button class="hamburger" [class.open]="menuOpen" (click)="menuOpen = !menuOpen" type="button">
    <span class="hamburger-bar"></span>
    <span class="hamburger-bar"></span>
    <span class="hamburger-bar"></span>
  </button>

  @if (isAuth$ | async) {
    <div class="nav-links" [class.open]="menuOpen">
      <a routerLink="/dashboard" routerLinkActive="active" (click)="menuOpen = false">仪表盘</a>
      <a routerLink="/instances" routerLinkActive="active" (click)="menuOpen = false">实例</a>
      <a routerLink="/settings" routerLinkActive="active" (click)="menuOpen = false">设置</a>
      <a routerLink="/storage" routerLinkActive="active" (click)="menuOpen = false">存储</a>
    </div>
  }

  @if ({ enabled: authEnabled$ | async, loggedIn: isAuth$ | async }; as authState) {
    <div class="nav-end">
      @if (authState.enabled && !authState.loggedIn) {
        <a routerLink="/login">登录管理</a>
      }
      @if (authState.enabled && authState.loggedIn) {
        <button class="nav-link" (click)="logout()">注销</button>
      }
    </div>
  }
</nav>

<main>
  <router-outlet></router-outlet>
</main>
