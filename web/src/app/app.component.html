<app-toast-container></app-toast-container>

<nav class="navbar navbar-expand-lg bg-white border-bottom">
  <div class="container-fluid">
    <a class="navbar-brand text-break" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Cache Proxy</a>

    @if ({ enabled: authEnabled$ | async, loggedIn: isAuth$ | async }; as authState) {
      <div class="d-flex align-items-center gap-2 order-lg-3">
        @if (authState.enabled && !authState.loggedIn) {
          <a class="nav-link" routerLink="/login">登录管理</a>
        }
        @if (authState.enabled && authState.loggedIn) {
          <button class="btn btn-link nav-link text-decoration-none" (click)="logout()">注销</button>
        }
      </div>
    }

    <button class="navbar-toggler" type="button" (click)="menuOpen = !menuOpen" [attr.aria-expanded]="menuOpen" aria-controls="mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse order-lg-2" id="mainNav" [ngbCollapse]="!menuOpen">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="menuOpen = false">首页</a>
        </li>
        @if (isAuth$ | async) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/dashboard" routerLinkActive="active" (click)="menuOpen = false">仪表盘</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/instances" routerLinkActive="active" (click)="menuOpen = false">实例</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/system" routerLinkActive="active" (click)="menuOpen = false">系统信息</a>
          </li>
        }
      </ul>
    </div>
  </div>
</nav>

<main>
  <router-outlet></router-outlet>
</main>
