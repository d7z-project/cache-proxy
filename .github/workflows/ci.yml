name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.23', '1.24', '1.25']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web && npm ci && npm run build

      - name: Build backend
        run: |
          CGO_ENABLED=0 go build -v -ldflags '
            -X gopkg.d7z.net/cache-proxy/pkg/server.DefaultBackend=/data
            -X gopkg.d7z.net/cache-proxy/pkg/server.DefaultBind=0.0.0.0:8080
          ' -o cache-proxy .

      - name: Run tests
        run: go test ./...

      - name: Build Docker (validate Dockerfile)
        run: docker build --load -t cache-proxy:test .
